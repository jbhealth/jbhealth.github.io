<style>
  :root{
    --navy:#1B3F6B;
    --blue:#2E86C1;

    --grey:#5C6B7A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'DM Sans',sans-serif;color:var(--dark);
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:32px;
    background:
      radial-gradient(800px 360px at 70% -10%, rgba(46,134,193,0.10), transparent 60%),

  }
  .brand{font-family:'Playfair Display',serif;font-weight:800;font-size:22px;color:var(--navy);margin-bottom:48px;}
  .brand span{color:var(--blue);}
  .code{
    font-family:'Playfair Display',serif;font-weight:800;
    font-size:clamp(72px,16vw,140px);line-height:1;color:var(--navy);
    letter-spacing:-0.02em;
  }
  h1{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(24px,4vw,34px);color:var(--navy);margin:16px 0 14px;}
  p{font-size:18px;color:var(--grey);max-width:42ch;margin-bottom:34px;line-height:1.55;}
  .btn{
    display:inline-block;background:var(--blue);color:#fff;font-weight:600;font-size:16px;
    padding:14px 30px;border-radius:8px;text-decoration:none;transition:all .2s ease;
    box-shadow:0 6px 20px rgba(46,134,193,0.28);
  }
  .btn:hover{background:var(--navy);transform:translateY(-2px);box-shadow:0 10px 26px rgba(27,63,107,0.32);}
  .tag{margin-top:46px;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:var(--grey);}
